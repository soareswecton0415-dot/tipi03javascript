<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="container">
        <img src="./img/Designer (1).jpeg" alt="logo da Confeitaria" class="logo">

        <h2>Sabores da Confeitaria 🍰</h2>
        <p id="mensagem">Clique no botão para ver nossos sabores disponíveis!</p>

        <button onclick="mostrarSabores()">Mostrar Sabores</button>

        <div id="sabores" style="display:none;" class="sabores">

            <div class="sabor">
                <img src="img/valentina-2.png">
                <p>🍫 Chocolate</p>
            </div>

            <div class="sabor">
                <img src="img/Fatia-Leite-Ninho-Morango.png">
                <p>🍓 Morango</p>
            </div>

            <div class="sabor">
                <img src="img/ouro-branco-2.png">
                <p>🍦 Baunilha</p>
            </div>

            <div class="sabor">
                <img src="img/bolo-red-velvet-blue-note-pedro-de-artagao.webp">
                <p>🍰 Red Velvet</p>
            </div>

        </div>
    </div>


    <script src="js/script.js"></script>
</body>

</html>
